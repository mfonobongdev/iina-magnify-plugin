<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    pointer-events: none;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }

  /* IINA hit-tests with elementFromPoint, so every interactive element needs
     pointer-events enabled AND a data-clickable attribute. */
  #magnifier {
    position: fixed;
    top: 16px;
    left: 16px;
    width: 220px;
    background: rgba(20, 20, 20, 0.75);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 8px;
    overflow: hidden;
    backdrop-filter: blur(8px);
    display: none;
  }

  #magnifier.visible { display: block; }

  /* Wireframe navigator: the full video frame in miniature */
  #frame {
    position: relative;
    width: 100%;
    background:
      linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
    background-size: 20% 20%;
    pointer-events: auto;
    cursor: crosshair;
  }

  /* Current viewport within the frame */
  #viewport {
    position: absolute;
    border: 2px solid #4a9eff;
    border-radius: 2px;
    background: rgba(74, 158, 255, 0.15);
    box-shadow: 0 0 6px rgba(74, 158, 255, 0.5);
    pointer-events: auto;
    cursor: grab;
  }

  #viewport.dragging { cursor: grabbing; }

  #toolbar {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 5px 6px;
    border-top: 1px solid rgba(255, 255, 255, 0.15);
  }

  #toolbar button {
    pointer-events: auto;
    background: rgba(255, 255, 255, 0.1);
    border: none;
    border-radius: 4px;
    color: rgba(255, 255, 255, 0.9);
    width: 24px;
    height: 22px;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
  }

  #toolbar button:hover { background: rgba(255, 255, 255, 0.22); }

  #zoomLabel {
    flex: 1;
    text-align: center;
    color: rgba(255, 255, 255, 0.85);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<div id="magnifier">
  <div id="frame" data-clickable>
    <div id="viewport" data-clickable></div>
  </div>
  <div id="toolbar">
    <button id="btnOut" data-clickable title="Zoom out (-)">−</button>
    <button id="btnIn" data-clickable title="Zoom in (=)">+</button>
    <span id="zoomLabel">1.0×</span>
    <button id="btnReset" data-clickable title="Reset (0)">⟲</button>
    <button id="btnClose" data-clickable title="Hide (z)">✕</button>
  </div>
</div>

<script>
  const magnifier = document.getElementById("magnifier");
  const frame = document.getElementById("frame");
  const viewport = document.getElementById("viewport");
  const zoomLabel = document.getElementById("zoomLabel");

  let state = { zoom: 0, panX: 0, panY: 0, visible: false, aspect: 16 / 9 };

  iina.onMessage("state", (s) => {
    state = s;
    render();
  });

  function render() {
    magnifier.classList.toggle("visible", state.visible);
    if (!state.visible) return;

    const scale = Math.pow(2, state.zoom);
    const frameW = frame.clientWidth;
    frame.style.height = `${frameW / state.aspect}px`;
    const frameH = frame.clientHeight;

    // Viewport center in normalized video coords: (0.5 − panX, 0.5 − panY);
    // its size is 1/scale of the frame.
    const size = 1 / scale;
    const left = (0.5 - state.panX - size / 2) * frameW;
    const top = (0.5 - state.panY - size / 2) * frameH;

    viewport.style.width = `${size * frameW}px`;
    viewport.style.height = `${size * frameH}px`;
    viewport.style.left = `${left}px`;
    viewport.style.top = `${top}px`;

    zoomLabel.textContent = `${scale.toFixed(1)}×`;
  }

  // ── Pan: drag the viewport, or click/drag anywhere in the frame ────────────

  function panToEvent(e) {
    const rect = frame.getBoundingClientRect();
    const u = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    const v = Math.min(1, Math.max(0, (e.clientY - rect.top) / rect.height));
    iina.postMessage("pan", { u, v });
  }

  frame.addEventListener("mousedown", (e) => {
    e.preventDefault();
    viewport.classList.add("dragging");
    panToEvent(e);

    function onMove(ev) { panToEvent(ev); }
    function onUp() {
      viewport.classList.remove("dragging");
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
    }
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });

  // Scroll over the navigator to zoom
  frame.addEventListener("wheel", (e) => {
    e.preventDefault();
    iina.postMessage("zoom", { delta: e.deltaY < 0 ? 0.25 : -0.25 });
  });

  // ── Toolbar ─────────────────────────────────────────────────────────────────

  document.getElementById("btnIn").addEventListener("click", () =>
    iina.postMessage("zoom", { delta: 0.5 })
  );
  document.getElementById("btnOut").addEventListener("click", () =>
    iina.postMessage("zoom", { delta: -0.5 })
  );
  document.getElementById("btnReset").addEventListener("click", () =>
    iina.postMessage("reset", {})
  );
  document.getElementById("btnClose").addEventListener("click", () =>
    iina.postMessage("close", {})
  );
</script>
</body>
</html>
